# ═══════════════════════════════════════════════
# FlowTrace — Docker Compose (Production)
# ═══════════════════════════════════════════════
version: "3.9"

services:
  flowtrace:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile
    container_name: flowtrace-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLOWTRACE_SECRET_KEY=${FLOWTRACE_SECRET_KEY}
      - FLOWTRACE_DEMO_MODE=${FLOWTRACE_DEMO_MODE:-false}
      - FLOWTRACE_AUTH_ENABLED=${FLOWTRACE_AUTH_ENABLED:-true}
      - JENKINS_URL=${JENKINS_URL:-http://host.docker.internal:8080}
      - JENKINS_USERNAME=${JENKINS_USERNAME}
      - JENKINS_TOKEN=${JENKINS_TOKEN}
    volumes:
      - flowtrace-data:/app/src/main/python/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  flowtrace-data:
    driver: local

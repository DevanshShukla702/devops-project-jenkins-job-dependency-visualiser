# FlowTrace Configuration
# -----------------------------------------------
# SECURITY NOTE: All sensitive values (secret_key, jenkins
# credentials) are loaded from ENVIRONMENT VARIABLES.
# See .env.example for the required variables.
# -----------------------------------------------

app:
  title: "FlowTrace"
  demo_mode: false
  auto_refresh_interval: 30

auth:
  enabled: true
  # secret_key is loaded from env: FLOWTRACE_SECRET_KEY

jenkins:
  # All Jenkins config loaded from environment variables:
  #   JENKINS_URL, JENKINS_USERNAME, JENKINS_TOKEN
  url: "http://localhost:8080"
  username: ""
  token: ""

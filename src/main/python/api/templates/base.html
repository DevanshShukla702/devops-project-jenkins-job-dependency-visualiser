<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FlowTrace — Jenkins Visualizer{% endblock %}</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    {% block extra_css %}{% endblock %}

    <!-- GSAP for Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <!-- vis-network -->
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body class="theme-dark">

    <div id="toast-container" class="toast-container"></div>

    <header class="navbar">
        <div class="nav-brand">
            <a href="/">
                <span class="logo-icon">⚙️</span>
                <span class="logo-text">FlowTrace</span>
            </a>
        </div>
        <nav class="nav-links">
            <a href="/dashboard">Dashboard</a>
            <a href="/jobs">Jobs</a>
            <a href="/about">About</a>
            <a href="/jenkins-guide">Jenkins Guide</a>
        </nav>
        <div class="nav-user">
            {% if current_user and current_user.is_authenticated %}
                <span class="user-avatar">{{ current_user.username[0] | upper }}</span>
                <a href="/logout" class="btn btn-outline" style="margin-left: 10px; font-size: 0.8rem; padding: 4px 8px;">Logout</a>
            {% else %}
                <a href="/login" class="btn btn-primary">Login</a>
            {% endif %}
        </div>
        <!-- Mobile Nav Toggle -->
        <button class="nav-toggle" aria-label="Toggle navigation">&#9776;</button>
    </header>

    <main class="page-content" id="main-content">
        {% block content %}{% endblock %}
    </main>

    {% block extra_js %}{% endblock %}
    <script src="{{ url_for('static', filename='js/toast.js') }}"></script>
    <script src="{{ url_for('static', filename='js/shortcuts.js') }}"></script>
    <script src="{{ url_for('static', filename='js/animations.js') }}"></script>
</body>
</html>

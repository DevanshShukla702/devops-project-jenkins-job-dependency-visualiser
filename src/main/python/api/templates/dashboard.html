<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FlowTrace — Jenkins Visualizer</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- vis-network -->
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="app">

    <!-- HEADER -->
    <header class="header">
        <div class="brand">
            <div class="logo">⚙️</div>
            <div>
                <div class="title">FlowTrace</div>
                <div class="subtitle">Jenkins Job Dependency Visualizer</div>
            </div>
        </div>

        <button class="refresh-btn" onclick="loadGraph()">↻ Refresh</button>
    </header>

    <!-- MAIN -->
    <div class="main">

        <!-- GRAPH -->
        <div class="graph-container">
            <div id="network"></div>

            <!-- LEGEND -->
            <div class="legend">
                <div><span class="dot success"></span>Success</div>
                <div><span class="dot warning"></span>Unstable</div>
                <div><span class="dot danger"></span>Failed</div>
                <div><span class="dot muted"></span>Not Built</div>
            </div>
        </div>

        <!-- DETAILS PANEL -->
        <div id="details-panel">
            <h2 id="job-title">Click a node</h2>
            <div id="job-details">No job selected</div>
        </div>

    </div>

</div>

<script src="/static/graph.js"></script>

</body>
</html>
